{% extends "base.html" %}
{% block title %}Register — Learnify{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="glass-card auth-container fade-up">
        <div class="text-center mb-4">
            <div class="mb-3">
                <i class="bi bi-person-plus" style="font-size: 2.5rem; color: var(--accent);"></i>
            </div>
            <h1 class="h4 mb-1">Create Account</h1>
            <p class="text-muted small mb-0">Register as a student or use the admin key.</p>
        </div>

        <form method="POST" action="">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="full_name" class="form-control" placeholder="John Doe" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="johndoe" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Admin Key <span class="text-muted">(optional)</span></label>
                <input type="password" name="admin_key" class="form-control" placeholder="Leave blank for student account">
            </div>

            <button type="submit" class="btn btn-primary-gradient w-100 py-2">
                <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
        </form>

        <div class="text-center mt-4">
            <p class="text-muted small mb-0">Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
